app = "twining-bench"
primary_region = "sjc"

[build]

[env]
  RESULTS_DIR = "/data/benchmark-results"
  NODE_ENV = "production"

[http_service]
  internal_port = 3838
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-2x"
  memory = "512mb"

[mounts]
  source = "benchmark_results"
  destination = "/data/benchmark-results"
