app = 'twining-benchmark'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3838
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 4
  memory_mb = 4096
