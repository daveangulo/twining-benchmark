name: Bug Report
description: Report a bug in the benchmark harness
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: "Run `node --version`"
      placeholder: "e.g. v20.11.0"
    validations:
      required: true
  - type: input
    id: claude-version
    attributes:
      label: Claude Code version
      description: "Run `claude --version`"
      placeholder: "e.g. 2.1.92"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Run `npx twining-bench run --scenario ... --condition ...`
        2. See error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages or stack traces
      render: shell
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the harness is affected?
      options:
        - CLI / Orchestrator
        - Agent Sessions
        - Scenarios / Scorers
        - Analysis Package (Python)
        - Dashboard
        - Documentation
        - Other
    validations:
      required: true
